# Marketing site (existing). npm-workspaces monorepo.
# Netlify cd's to apps/marketing per `base`; the command then bounces back to
# the repo root for `npm install` (so workspaces resolve), then builds the
# marketing workspace. publish is relative to base.
# The ops site has its own Netlify project linked from apps/ops/.

[build]
  base = "apps/marketing"
  command = "cd ../.. && npm install && npm run build:marketing"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
