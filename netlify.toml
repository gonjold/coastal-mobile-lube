# Marketing site Netlify config. Build runs from the repo root so npm install
# sees the workspaces declaration in root package.json and symlinks
# packages/shared-ui into apps/marketing/node_modules/@coastal/shared-ui.
# Previously base was set to apps/marketing, which scoped install too narrowly
# and broke @coastal/shared-ui resolution starting with A3a.

[build]
  command = "npm install && npm run build:marketing"
  publish = "apps/marketing/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "https://coastal-mobile-lube.netlify.app/*"
  to = "https://coastalmobilelube.com/:splat"
  status = 301
  force = true
